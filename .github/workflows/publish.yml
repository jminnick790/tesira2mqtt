name: Build & Publish Docker Image

on:
  push:
    branches:
      - main          # builds :latest on every merge to main
    tags:
      - "v*"          # builds :v1.2.3 + :latest on version tags

  pull_request:
    branches:
      - main          # build-only (no push) on PRs to catch Dockerfile issues early

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. jminnick790/tesira2mqtt

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # automatically provided, no setup needed

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # :v1.2.3 on version tags
            type=semver,pattern={{version}}
            # :v1.2 (minor) on version tags
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64   # amd64 for servers, arm64 for Pi/NUC
