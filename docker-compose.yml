services:
  tesira-bridge:
    build: .
    image: tesira-bridge:latest
    container_name: tesira-bridge
    restart: unless-stopped
    volumes:
      - ./config:/config:ro        # config.yaml lives here (read-only inside container)
    environment:
      # ── Config path ──────────────────────────────────────────────────────────
      - CONFIG_PATH=/config/config.yaml

      # ── Logging — value loaded from .env (DEBUG for raw TTP tracing) ──────────
      - LOG_LEVEL

      # ── Tesira connection — values loaded from .env ───────────────────────────
      - TESIRA_HOST
      #- TESIRA_PORT
      #- TESIRA_USERNAME
      #- TESIRA_PASSWORD

      # ── MQTT broker — values loaded from .env ────────────────────────────────
      - MQTT_HOST
      #- MQTT_PORT
      - MQTT_USERNAME
      - MQTT_PASSWORD

    network_mode: host             # simplest for LAN devices on a private network
                                   # avoids needing extra_hosts for Tesira/MQTT discovery
    labels:
      - "com.centurylinklabs.watchtower.enable=true"   # optional: Watchtower auto-update
